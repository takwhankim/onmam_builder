<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>온맘 교회 홈페이지 빌더</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300..900&family=Noto+Serif+KR:wght@300..900&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ───────── 빌더 UI ───────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#182233; --ink2:#253044; --line:#ded8cc; --paper:#f3f1eb; --card:#fff;
  --panel:#fbfaf7; --soft:#f7f5ef; --amber:#c8861f; --amber2:#a96e12; --txt:#2b2f38; --mut:#747c8d; --ok:#2e7d4f; --no:#b3452f;
}
html,body{height:100%}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,Roboto,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--paper);color:var(--txt);overflow:hidden}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:6px;padding:7px 9px;width:100%;background:#fff;color:var(--txt)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--amber);outline-offset:0;border-color:var(--amber)}
textarea{resize:vertical;min-height:64px;line-height:1.6}
.rich-card{border:1px solid var(--line);border-radius:8px;background:#fff;overflow:hidden}
.rich-prev{min-height:54px;max-height:120px;overflow:hidden;padding:9px 10px;font-size:12.5px;line-height:1.7;color:#4a5160;background:#fbfaf7;border-bottom:1px solid var(--line)}
.rich-prev p{margin:0 0 6px}.rich-prev p:last-child{margin-bottom:0}.rich-prev.empty{color:var(--mut)}
.rich-actions{display:flex;gap:6px;padding:7px;background:#fff}
#richModal{position:fixed;inset:0;background:rgba(15,21,33,.55);z-index:120;display:none;align-items:center;justify-content:center;padding:18px}
#richModal.on{display:flex}
.rich-dialog{width:min(1180px,100%);height:min(820px,92vh);background:#fff;border-radius:12px;box-shadow:0 24px 80px rgba(0,0,0,.28);display:flex;flex-direction:column;overflow:hidden}
.rich-head{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--line);background:#fbfaf7}
.rich-head b{font-size:14px;color:var(--ink)}
.rich-close{border:0;background:transparent;font-size:20px;color:#4a5160;padding:4px 8px}
.rich-toolbar{display:flex;align-items:center;justify-content:center;gap:5px;flex-wrap:nowrap;padding:9px 12px;border-bottom:1px solid #ece7de;background:#fff;box-shadow:0 1px 8px rgba(29,36,51,.04);position:relative;z-index:2;overflow-x:auto;overflow-y:hidden}
.rich-toolbar button,.rich-toolbar select{border:0;background:#fff;border-radius:8px;height:32px;padding:0 8px;font-size:13px;font-weight:800;color:#3c4454;flex:0 0 auto;white-space:nowrap}
.rich-toolbar button{min-width:30px}.rich-toolbar select{border:1px solid transparent;font-weight:700;min-width:0;width:auto;max-width:120px}.rich-toolbar .font{width:132px;max-width:132px}.rich-toolbar .zoom{min-width:58px;text-align:center;flex:0 0 auto}.rich-toolbar button:hover,.rich-toolbar button.on,.rich-toolbar select:hover{color:var(--amber2);background:#f3f4f6}.rich-toolbar .sep{width:1px;height:24px;background:#e6e0d6;margin:0 3px;flex:0 0 auto}
.rich-editor{flex:1;min-height:0;overflow:auto;padding:38px 22px;background:linear-gradient(#f7f8fa,#f1f3f6)}
.rich-page{width:min(760px,100%);min-height:560px;margin:0 auto;background:#fff;border-radius:6px;box-shadow:0 14px 40px rgba(29,36,51,.10);padding:78px 86px;color:#242936}
.rich-editor .ProseMirror{min-height:430px;outline:0;line-height:1.75;font-size:16px;color:#242936}
.rich-editor .ProseMirror p{margin:0 0 12px}.rich-editor .ProseMirror h2{font-size:26px;margin:20px 0 10px}.rich-editor .ProseMirror h3{font-size:20px;margin:16px 0 8px}
.rich-editor .ProseMirror ul,.rich-editor .ProseMirror ol{padding-left:24px;margin:0 0 12px}.rich-editor .ProseMirror blockquote{border-left:4px solid var(--amber);padding:8px 12px;margin:12px 0;background:#fbfaf7}
.rich-editor .ProseMirror img{max-width:100%;border-radius:8px}.rich-editor .ProseMirror iframe{width:100%;aspect-ratio:16/9;border:0;border-radius:8px}
.rich-editor .ProseMirror table{border-collapse:collapse;width:100%;margin:12px 0}.rich-editor .ProseMirror th,.rich-editor .ProseMirror td{border:1px solid #d9d4c8;padding:7px 9px}
.rich-foot{display:flex;justify-content:space-between;gap:8px;padding:10px 12px;border-top:1px solid var(--line);background:#fbfaf7}
.rich-foot .left{font-size:12px;color:var(--mut);align-self:center}
.rich-foot .right{display:flex;gap:8px}
.rich-fallback{width:100%;min-height:430px;border:0;outline:0;font-size:16px;line-height:1.75;color:#242936}
.rich-fallback p{margin:0 0 12px}.rich-fallback h2{font-size:26px;margin:20px 0 10px}.rich-fallback h3{font-size:20px;margin:16px 0 8px}
.rich-fallback ul,.rich-fallback ol{padding-left:24px;margin:0 0 12px}.rich-fallback blockquote{border-left:4px solid var(--amber);padding:8px 12px;margin:12px 0;background:#fbfaf7}
.rich-fallback img{max-width:100%;border-radius:8px}.rich-fallback iframe{width:100%;aspect-ratio:16/9;border:0;border-radius:8px}
.rich-fallback table{border-collapse:collapse;width:100%;margin:12px 0}.rich-fallback th,.rich-fallback td{border:1px solid #d9d4c8;padding:7px 9px}

/* 상단바 */
#topbar{display:flex;align-items:center;gap:14px;height:56px;background:#172131;color:#e9e4d8;padding:0 18px;position:relative;z-index:50;border-bottom:1px solid rgba(255,255,255,.08);box-shadow:0 1px 0 rgba(255,255,255,.03)}
#topbar .logo{display:flex;align-items:center;gap:9px;font-weight:900;font-size:16px;letter-spacing:0;white-space:nowrap;min-width:220px}
#topbar .logo b{color:var(--amber)}
#topbar .logo small{font-weight:600;font-size:11px;color:#a9b0bf;margin-left:2px}
.role-switch{display:flex;background:#0f1724;border:1px solid rgba(255,255,255,.06);border-radius:999px;padding:4px;margin:0 auto;box-shadow:inset 0 1px 2px rgba(0,0,0,.22)}
.role-switch button{border:0;background:transparent;color:#a8afbf;font-size:12.5px;font-weight:800;padding:7px 16px;border-radius:999px;white-space:nowrap;line-height:1}
.role-switch button.on{background:var(--amber);color:#fff;box-shadow:0 5px 14px rgba(200,134,31,.24)}
.role-switch button:disabled{opacity:.35;cursor:not-allowed}
.dev-switch{display:flex;gap:3px;background:#0f1724;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:4px}
.dev-switch button{border:0;background:transparent;color:#a8afbf;font-size:13px;min-width:30px;height:28px;padding:0 8px;border-radius:7px}
.dev-switch button.on{background:#2b3548;color:#fff}
#topbar .acts{display:flex;gap:8px;align-items:center}
.tb-btn{border:1px solid rgba(255,255,255,.12);background:#243044;color:#edf0f6;font-size:12.5px;font-weight:800;padding:8px 13px;border-radius:9px;white-space:nowrap;line-height:1}
.tb-btn.gold{background:var(--amber);border-color:var(--amber);color:#fff}
.tb-btn:hover{filter:brightness(1.08)}
#saveState{font-size:11.5px;color:#a8afbf;white-space:nowrap;min-width:72px;text-align:right}

/* 레이아웃 */
#wrap{display:flex;height:calc(100% - 56px);background:var(--paper)}
#panel{width:540px;min-width:540px;background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;transition:margin .25s;box-shadow:1px 0 0 rgba(255,255,255,.7)}
#panel.hide{margin-left:-540px}
#ptabs{display:flex;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;border-bottom:1px solid var(--line);background:var(--panel);padding:0 8px;gap:3px}
#ptabs button{flex:1 0 auto;border:0;background:transparent;font-size:12px;font-weight:850;color:var(--mut);padding:14px 8px 12px;border-bottom:3px solid transparent;min-width:max-content;white-space:nowrap;line-height:1.2}
#ptabs button.on{color:var(--amber2);border-bottom-color:var(--amber);background:#fff}
#pbody{flex:1;overflow-y:auto;padding:18px 18px 64px;background:#fff}
#pbody h3{font-size:15px;font-weight:900;margin:0 0 6px;color:var(--ink);line-height:1.35}
#pbody .desc{font-size:12.5px;color:var(--mut);line-height:1.65;margin-bottom:16px}
#aiPanel{width:420px;min-width:420px;background:#fff;border-left:1px solid var(--line);display:flex;flex-direction:column;transition:margin .25s;box-shadow:-1px 0 0 rgba(255,255,255,.7)}
#aiPanel.hide{margin-right:-420px}
.ai-head{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--line);background:var(--panel)}
.ai-head b{font-size:13.5px;color:var(--ink)}.ai-head small{font-size:11px;color:var(--mut);display:block;margin-top:1px}.ai-toggle{border:1px solid var(--line);background:#fff;border-radius:7px;padding:5px 8px;font-size:12px;font-weight:800;color:#4a5160}
.ai-body{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:#f7f6f2}.ai-msg{border-radius:12px;padding:10px 12px;font-size:12.5px;line-height:1.65;box-shadow:0 4px 14px rgba(29,36,51,.06)}.ai-msg.assistant{background:#fff;border:1px solid var(--line);color:#3b4250}.ai-msg.user{background:#1d2433;color:#fff;margin-left:28px}.ai-msg pre{white-space:pre-wrap;font-family:inherit;margin:0}.ai-tools{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:12px;border-top:1px solid var(--line);background:#fff}.ai-tools button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 9px;font-size:12px;font-weight:800;color:#4a5160}.ai-tools button:hover{border-color:var(--amber);color:var(--amber2);background:#fdf6ea}.ai-compose{padding:12px;border-top:1px solid var(--line);background:#fbfaf7}.ai-compose textarea{min-height:88px;resize:vertical}.ai-actions{display:flex;gap:7px;margin-top:8px}.ai-actions button{flex:1;border:0;border-radius:8px;padding:9px;font-size:12.5px;font-weight:900}.ai-actions .ask{background:var(--amber);color:#fff}.ai-actions .insert{background:var(--ink);color:#fff}.ai-note{font-size:11px;color:var(--mut);line-height:1.55;margin-top:8px}
.f-row{margin-bottom:12px}
.f-row label{display:block;font-size:11.5px;font-weight:700;color:#555c6b;margin-bottom:5px}
.f-grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.chip-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.chip{border:1px solid var(--line);border-radius:8px;background:#fff;padding:11px;text-align:left;font-size:12.5px;font-weight:800;box-shadow:0 1px 0 rgba(29,36,51,.03)}
.chip:hover{border-color:var(--amber)}
.chip.on{border-color:var(--amber);background:#fff8ec;box-shadow:0 0 0 2px rgba(200,134,31,.09)}
.chip .sw{display:flex;gap:4px;margin-bottom:6px}
.chip .sw i{width:16px;height:16px;border-radius:4px;display:inline-block}
.chip small{display:block;font-weight:400;color:var(--mut);font-size:11px;margin-top:2px}
.sec-add{display:flex;align-items:center;gap:9px;width:100%;border:1px dashed #cfc8b8;background:#fdfcf9;border-radius:9px;padding:9px 11px;font-size:12.5px;font-weight:700;color:#4a5160;margin-bottom:7px;text-align:left}
.sec-add:hover{border-color:var(--amber);background:#fdf6ea}
.sec-add .ic{font-size:16px}
.sec-add small{font-weight:400;color:var(--mut);display:block;font-size:11px}
.sec-li{display:flex;align-items:center;gap:7px;background:#fbfaf7;border:1px solid var(--line);border-radius:8px;padding:9px 10px;margin-bottom:7px;font-size:12.5px;font-weight:800}
.sec-li.off{opacity:.5}
.sec-li .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini{border:1px solid var(--line);background:#fff;border-radius:7px;font-size:12px;padding:4px 8px;color:#4a5160;line-height:1.35;font-weight:800}
.mini:hover{border-color:var(--amber);color:var(--amber2)}
.mini.danger:hover{border-color:var(--no);color:var(--no)}
.btn{display:block;width:100%;border:0;border-radius:9px;padding:12px;font-size:13px;font-weight:900;margin-bottom:8px}
.btn.gold{background:var(--amber);color:#fff}
.btn.dark{background:var(--ink);color:#f1ecdf}
.btn.line{background:#fff;border:1.5px solid var(--line);color:#4a5160}
.btn:hover{filter:brightness(1.06)}
.quick{display:flex;align-items:center;gap:11px;width:100%;border:1px solid var(--line);background:#fff;border-radius:10px;padding:14px;margin-bottom:9px;text-align:left;box-shadow:0 1px 0 rgba(29,36,51,.03)}
.quick:hover{border-color:var(--amber);background:#fdf6ea}
.quick .ic{font-size:21px}
.quick b{display:block;font-size:13px}
.quick small{color:var(--mut);font-size:11.5px}
.back-row{display:flex;align-items:center;gap:8px;margin-bottom:13px}
.back-row button{border:1px solid var(--line);background:#fff;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:700;color:#4a5160}
.back-row b{font-size:13.5px}
.list-tbl{border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-bottom:8px}
.list-row{display:flex;gap:5px;align-items:flex-start;padding:8px;border-bottom:1px solid var(--line);background:#fff}
.list-row:last-child{border-bottom:0}
.list-row .cols{flex:1;display:flex;flex-direction:column;gap:5px}
.list-row .ops{display:flex;flex-direction:column;gap:3px}
.img-field{display:flex;gap:6px;align-items:center}
.img-field .thumb{width:44px;height:44px;border-radius:7px;border:1px solid var(--line);background:#eee center/cover no-repeat;flex:none}
.img-field .col{flex:1;display:flex;flex-direction:column;gap:5px}
.check-li{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:7px 10px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;background:#fff}
.check-li.ok{border-color:#cfe5d6;background:#f3faf5}
.check-li .st{font-weight:900}
.check-li.ok .st{color:var(--ok)} .check-li:not(.ok) .st{color:var(--no)}
.note{font-size:11.5px;color:var(--mut);line-height:1.7;background:#fbfaf7;border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin:10px 0}
.hr{border:0;border-top:1px solid var(--line);margin:16px 0}
.tag{display:inline-block;font-size:10.5px;font-weight:800;border-radius:5px;padding:2px 7px;background:#eef1f6;color:#5a6378;margin-left:6px;vertical-align:1px}
.tag.gold{background:#fdf0d8;color:var(--amber2)}

/* 미리보기 */
#stage{flex:1;overflow:auto;padding:26px;display:flex;justify-content:center;align-items:flex-start;background:#eeeae2;background-image:linear-gradient(rgba(255,255,255,.58) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.58) 1px,transparent 1px);background-size:24px 24px}
#frame{width:100%;max-width:1180px;background:#fff;border-radius:14px;box-shadow:0 18px 46px rgba(29,36,51,.16);overflow:hidden;transition:max-width .3s;border:1px solid rgba(29,36,51,.08)}
#frame.tablet{max-width:768px}
#frame.mobile{max-width:392px}
#frame .chrome{height:32px;background:#e7e1d6;display:flex;align-items:center;gap:7px;padding:0 13px;border-bottom:1px solid rgba(29,36,51,.08)}
#frame .chrome i{width:9px;height:9px;border-radius:50%;background:#d1c9ba;box-shadow:inset 0 0 0 1px rgba(0,0,0,.04)}
#frame .chrome span{font-size:11px;color:#8b8375;margin-left:8px;font-weight:700}

/* 편집 오버레이 */
.file-field{display:flex;gap:5px;align-items:center;width:100%}
.e-sec{position:relative}
.hdrag{position:absolute;left:0;right:0;bottom:0;height:18px;display:flex;align-items:center;justify-content:center;cursor:ns-resize;z-index:25;touch-action:none;user-select:none;opacity:0;transition:opacity .15s}
.e-sec:hover .hdrag,.cat-visual:hover .hdrag,.hdrag.on{opacity:1}
.hdrag span{background:#1d2433;color:#fff;font-size:11px;font-weight:700;padding:3px 12px;border-radius:999px;box-shadow:0 4px 12px rgba(0,0,0,.25);pointer-events:none}
.hdrag::before{content:'';position:absolute;left:0;right:0;bottom:0;height:3px;background:#c8861f;opacity:.85}
.e-sec.hl{outline:2px dashed var(--amber);outline-offset:-2px}
.e-bar{position:absolute;top:8px;right:8px;z-index:30;display:none;gap:4px;background:rgba(29,36,51,.92);border-radius:8px;padding:4px}
.e-sec:hover>.e-bar{display:flex}
.e-bar button{border:0;background:transparent;color:#fff;font-size:12.5px;padding:4px 7px;border-radius:5px}
.e-bar button:hover{background:var(--amber)}
.e-bar .lb{color:#cdd3e0;font-size:11px;font-weight:700;align-self:center;padding:0 4px}
.sec-hidden-note{background:repeating-linear-gradient(45deg,#f6f3ea,#f6f3ea 10px,#efe9da 10px,#efe9da 20px);color:#7d7460;text-align:center;font-size:12px;font-weight:700;padding:10px}

#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;font-weight:700;padding:11px 20px;border-radius:999px;opacity:0;pointer-events:none;transition:.25s;z-index:99}
#toast.on{opacity:1;transform:translateX(-50%)}

@media (max-width:860px){
  #panel{position:absolute;z-index:40;height:calc(100% - 56px);box-shadow:8px 0 30px rgba(0,0,0,.15)}
  #aiPanel{display:none}
  #topbar .logo small{display:none}
  .role-switch button{padding:6px 9px;font-size:11.5px}
}

/* ───────── 산출 사이트 공통 CSS (미리보기 주입용) ───────── */
</style>
<style id="site-style"></style>
</head>
<body>

<div id="topbar">
  <div class="logo">🏛 <span>온맘<b>빌더</b></span> <small>교회 홈페이지 플랫폼</small></div>
  <div class="role-switch" id="roleSwitch"></div>
  <div class="dev-switch" id="devSwitch">
    <button data-d="" class="on" title="PC">🖥</button>
    <button data-d="tablet" title="태블릿">📱</button>
    <button data-d="mobile" title="모바일">📲</button>
  </div>
  <div class="acts">
    <span id="saveState"></span>
    <button class="tb-btn" id="btnSave">저장</button>
    <button class="tb-btn gold" id="btnDeliver">납품 · 내보내기</button>
  </div>
</div>

<div id="wrap">
  <div id="panel">
    <div id="ptabs"></div>
    <div id="pbody"></div>
  </div>
  <div id="stage">
    <div id="frame">
      <div class="chrome"><i></i><i></i><i></i><span id="chromeUrl">https://</span></div>
      <div id="preview"></div>
    </div>
  </div>
  <aside id="aiPanel">
    <div class="ai-head"><span><b>AI 작업 도우미</b><small>글 · 이미지 아이디어 보조</small></span><button class="ai-toggle" id="aiClear">비우기</button></div>
    <div class="ai-body" id="aiBody">
      <div class="ai-msg assistant">게시글 초안, 문장 다듬기, 대표 이미지 프롬프트를 이곳에서 준비할 수 있습니다. 실제 AI 연결은 서버/API 단계에서 붙이면 됩니다.</div>
    </div>
    <div class="ai-compose">
      <textarea id="aiInput" placeholder="예: 유치부 여름성경학교 안내문을 따뜻한 톤으로 써줘"></textarea>
      <div class="ai-actions"><button class="ask" id="aiAsk">작성하기</button><button class="insert" id="aiInsert">본문에 넣기</button></div>
      <div class="ai-note">현재는 로컬 보조 모드입니다. 나중에 API를 연결하면 실제 AI 답변으로 바꿀 수 있습니다.</div>
    </div>
  </aside>
</div>

<div id="toast"></div>
<div id="richModal" aria-hidden="true"></div>
<input type="file" id="fileGhost" accept="image/*" style="display:none">
<input type="file" id="anyGhost" style="display:none">
<input type="file" id="jsonGhost" accept=".json,application/json" style="display:none">
<script type="application/json" id="seed">null</script>
<script>
/* ════════════════ 데이터 정의 ════════════════ */

const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const attr = s => esc(s).replace(/'/g,'&#39;');
const nl = s => esc(s).replace(/\n/g,'<br>');
const cssUrl = s => String(s??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n|\r|\f/g,'');
const safeUrl = (u, fallback='') => {
  const v=String(u||'').trim();
  if(!v) return fallback;
  if(v.startsWith('#') || v.startsWith('/') || v.startsWith('./') || v.startsWith('../') || v.startsWith('data:image/') || v.startsWith('data:application/')) return v;
  try{ const url=new URL(v, location.href); return /^(https?:|mailto:|tel:)$/i.test(url.protocol) ? v : fallback; }catch(_){ return fallback; }
};
function richHTML(s){
  const raw=String(s||'').trim();
  if(!raw) return '';
  if(!/<[a-z][\s\S]*>/i.test(raw)) return nl(raw);
  const tpl=document.createElement('template'); tpl.innerHTML=raw;
  const tags=new Set('P BR B STRONG I EM U S A UL OL LI BLOCKQUOTE H2 H3 H4 HR IMG FIGURE FIGCAPTION TABLE THEAD TBODY TR TH TD PRE CODE IFRAME'.split(' '));
  const walk=node=>{
    [...node.childNodes].forEach(ch=>{
      if(ch.nodeType===8){ ch.remove(); return; }
      if(ch.nodeType!==1) return;
      const tag=ch.tagName;
      if(!tags.has(tag)){ tag==='SCRIPT'||tag==='STYLE'||tag==='IFRAME' ? ch.remove() : ch.replaceWith(...ch.childNodes); return; }
      const href0=ch.getAttribute('href'), src0=ch.getAttribute('src'), alt0=ch.getAttribute('alt')||'';
      [...ch.attributes].forEach(a=>ch.removeAttribute(a.name));
      if(tag==='A'){ const href=safeUrl(href0); if(href){ ch.setAttribute('href',href); ch.setAttribute('target','_blank'); ch.setAttribute('rel','noopener'); } }
      if(tag==='IMG'){ const src=safeUrl(src0); if(src){ ch.setAttribute('src',src); ch.setAttribute('alt',alt0); } else ch.remove(); }
      if(tag==='IFRAME'){ const src=safeUrl(src0); if(/^https:\/\/(www\.)?(youtube(-nocookie)?\.com)\//i.test(src)){ ch.setAttribute('src',src); ch.setAttribute('title','동영상'); ch.setAttribute('loading','lazy'); ch.setAttribute('allowfullscreen',''); } else ch.remove(); }
      walk(ch);
    });
  };
  walk(tpl.content);
  return tpl.innerHTML;
}
function richEditorHTML(s){
  const raw=String(s||'').trim();
  if(!raw) return '<p></p>';
  if(/<[a-z][\s\S]*>/i.test(raw)) return raw;
  return raw.split(/\n{2,}/).map(p=>`<p>${esc(p).replace(/\n/g,'<br>')}</p>`).join('');
}

function ph(kind){
  const cross = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'><rect width='80' height='80' fill='none'/><path d='M40 18v44M26 32h28' stroke='rgba(255,255,255,.5)' stroke-width='3' stroke-linecap='round'/></svg>`;
  return `linear-gradient(135deg, var(--sp) 0%, color-mix(in srgb, var(--sp) 60%, var(--sa)) 100%)` + (kind==='cross' ? `` : ``);
}
function bgStyle(img, fallbackClass){
  const u=safeUrl(img);
  return u ? `background-image:url('${cssUrl(u)}')` : '';
}

function defaultBoardOptions(){ return {write:true, edit:true, del:true, author:true, notice:true, secret:true, comments:false}; }
function ensureBoardOptions(d){ d.opts=Object.assign(defaultBoardOptions(), d.opts||{}); return d.opts; }

function makeSection(type, site){
  return {id:uid(), type, on:true, data: SECTIONS[type].def(site)};
}
function pageFromPreset(k, site){
  const pr=PAGE_PRESETS[k]; if(!pr) return null;
  const pg={id:uid(),type:pr.type,on:true,data:SECTIONS[pr.type].def(site)};
  pg.data.title=pr.title;
  if(pg.type==='board'||pg.type==='photo'||pg.type==='video') pg.data.opts=defaultBoardOptions();
  if(pr.items){
    pg.data.items=JSON.parse(JSON.stringify(pr.items));
    pg.data.items.forEach(item=>{ if(Object.prototype.hasOwnProperty.call(item,'d')&&!item.d) item.d=today(); });
  }
  if(pr.body) pg.data.body=pr.body;
  return pg;
}
function findMenuBySectionType(type){
  const sec=site.sections.find(x=>x.type===type);
  if(!sec) return null;
  return site.menus.find(m=>m.url===undefined&&m.to===sec.id) || null;
}
function attachPageToMenu(pg, label, parentType){
  const item={id:'m'+pg.id,label:label||pg.data.title||SECTIONS[pg.type].name,to:'p:'+pg.id,on:true,children:[]};
  let parent=parentType?findMenuBySectionType(parentType):null;
  if(!parent){ site.menus.push(item); return false; }
  parent.children=parent.children||[];
  if(parent.children.length>=10){ site.menus.push(item); return false; }
  parent.children.push(item); return true;
}
function makeMenuContent(kind, parentLabel){
  if(kind==='page'){
    const pg={id:uid(),type:'page',on:true,data:SECTIONS.page.def(site)};
    pg.data.title=(parentLabel||'새')+' 안내';
    pg.data.body='<p>운영자가 이 페이지의 글, 그림, 표를 편집할 수 있습니다.</p>';
    return {pg,label:'새 페이지'};
  }
  const pg=pageFromPreset(kind,site);
  const pr=PAGE_PRESETS[kind];
  return pg&&pr ? {pg,label:pr.menuLabel||pg.data.title} : null;
}
function defaultSite(tpl='full'){
  const t=TEMPLATES[tpl];
  const site={
    meta:{name:'은혜샘교회', slogan:'함께 예배하고 함께 자라는 공동체', pastor:'김믿음', denom:'대한예수교장로회', logo:'', logoOnly:false,
      address:'서울특별시 ○○구 ○○로 123', tel:'02-000-0000', email:'', desc:'', ogImg:'', domain:''},
    theme:{preset:t.theme, font:t.font, hw:'700', bw:'400', custom:false, p:THEMES[t.theme].p, a:THEMES[t.theme].a},
    popup:{on:false, title:'알려드립니다', body:'', img:''},
    design:{width:1200, full:false},
    menus:[], sections:[], pages:[]
  };
  site.sections = t.secs.map(ty=>makeSection(ty,site));
  site.menus = site.sections.filter(x=>['worship','sermon','notice','greeting','newcomer','location','ministries'].includes(x.type))
    .map(x=>({id:'m'+x.id, label:SECTIONS[x.type].name, to:x.id, on:true, children:[]}));
  return site;
}

/* ════════════════ 사이트 렌더 ════════════════ */
function goAttr(to){
  return (to&&String(to).startsWith('p:'))
    ? `href="#pg-${esc(String(to).slice(2))}" data-page="${esc(String(to).slice(2))}"`
    : `href="#go-${esc(to||'')}" data-go="${esc(to||'')}"`;
}
function menuLinkHTML(m, opts={}){
  if(opts.cat) return `<a href="#cat-${attr(m.id)}" data-cat="${attr(m.id)}">${esc(m.label)}</a>`;
  return m.url!==undefined
    ? `<a href="${attr(safeUrl(m.url,'#'))}" target="_blank" rel="noopener">${esc(m.label)}</a>`
    : `<a ${goAttr(m.to)}>${esc(m.label)}</a>`;
}
function renderHeader(site){
  const nav=site.menus.filter(m=>m.on).map(m=>{
    const kids=(m.children||[]).filter(c=>c.on);
    if(!kids.length) return `<div class="mi">${menuLinkHTML(m)}</div>`;
    return `<div class="mi has-sub"><span class="mi-row">${menuLinkHTML(m,{cat:true})}<button class="subtg" data-subtg aria-label="하위 메뉴 열기">▾</button></span>
      <div class="sub">${kids.map(c=>{
        const g=(c.children||[]).filter(x=>x.on);
        if(!g.length) return `<div class="si">${menuLinkHTML(c)}</div>`;
        return `<div class="si has-sub"><span class="mi-row">${menuLinkHTML(c,{cat:true})}<button class="subtg" data-subtg aria-label="하위 메뉴 열기">▸</button></span>
          <div class="sub2">${g.map(x=>`<div class="si">${menuLinkHTML(x)}</div>`).join('')}</div></div>`;
      }).join('')}</div></div>`;
  }).join('');
  return `<header class="shead"><div class="shead-in">
    <div class="slogo">${site.meta.logo?`<img class="slogo-img" src="${esc(site.meta.logo)}" alt="${esc(site.meta.name)}">`:''}${(site.meta.logo&&site.meta.logoOnly)?'':`<span class="slogo-tx">${esc(site.meta.name)}${site.meta.denom?`<small>${esc(site.meta.denom)}</small>`:''}</span>`}</div>
    <button class="sham" data-ham aria-label="메뉴">☰</button>
    <nav class="snav" data-nav>${nav}</nav>
  </div></header>`;
}
function targetKey(m){ return m?.url!==undefined ? 'url:'+m.id : String(m?.to||''); }
function renderTargetContent(site,m){
  if(!m) return '<div class="cat-empty">연결된 메뉴가 없습니다.</div>';
  if(m.url!==undefined) return `<div class="wrap1 narrow"><h2 class="sec-t">${esc(m.label)}</h2><p class="free-body">외부 링크 메뉴입니다.</p><p class="wmemo"><a href="${attr(safeUrl(m.url,'#'))}" target="_blank" rel="noopener">새 창에서 열기</a></p></div>`;
  const to=String(m.to||'');
  if(to.startsWith('p:')){ const pg=(site.pages||[]).find(x=>x.id===to.slice(2)); const def=pg&&SECTIONS[pg.type]; return def?def.render(pg.data,site,pg):'<div class="cat-empty">페이지를 찾을 수 없습니다.</div>'; }
  const sec=(site.sections||[]).find(x=>x.id===to); const def=sec&&SECTIONS[sec.type];
  return def?def.render(sec.data,site,sec):'<div class="cat-empty">연결된 콘텐츠를 찾을 수 없습니다.</div>';
}
function renderCategoryPages(site, editable=false){
  const cats=[];
  (function walk(arr){ (arr||[]).filter(m=>m.on).forEach(m=>{ const kids=(m.children||[]).filter(c=>c.on); if(kids.length) cats.push({m,kids}); walk(kids); }); })(site.menus||[]);
  return cats.map(({m,kids})=>{
    const first=targetKey(kids[0]);
    const tabs=kids.map((c,i)=>`<button class="cat-link ${i===0?'on':''}" type="button" data-catpanel="${attr(targetKey(c))}">${esc(c.label)}</button>`).join('');
    const panels=kids.map((c,i)=>`<div class="cat-panel" data-catpane="${attr(targetKey(c))}" ${i?'hidden':''}>${renderTargetContent(site,c)}</div>`).join('');
    const img=safeUrl(m.catImg||''), h=Math.min(520,Math.max(120,+m.catH||220)), title=m.catTitle||m.label;
    const fs=Math.min(72,Math.max(20,+m.catFs||34)), align=['left','center','right'].includes(m.catAlign)?m.catAlign:'center';
    const drag=editable?`<div class="hdrag" data-cathdrag="${attr(m.id)}" title="끌어서 높이 조절"><span>⣿ 높이 조절</span></div>`:'';
    return `<div class="s-page cat-page" data-catview="${attr(m.id)}" hidden><div class="cat-visual align-${align} ${img?'has-img':''}" data-catvisual="${attr(m.id)}" style="min-height:${h}px;--cat-title-size:${fs}px;${img?`background-image:url('${cssUrl(img)}')`:''}"><div class="cat-visual-in"><h1>${nl(title)}</h1></div>${drag}</div><div class="wrap1 cat-shell"><aside class="cat-side"><div class="cat-title">${esc(m.label)}</div><div class="cat-menu">${tabs}</div></aside><div class="cat-main" data-catmain="${attr(m.id)}">${panels}</div></div></div>`;
  }).join('');
}
function renderFooter(site){
  const m=site.meta;
  return `<footer class="sfoot"><b>${esc(m.name)}</b>
    ${[m.address, m.tel?'Tel. '+m.tel:'', m.email].filter(Boolean).map(esc).join(' · ')}<br>
    © ${new Date().getFullYear()} ${esc(m.name)}. All rights reserved.
    <div class="pw">Powered by <a href="https://www.onmam.com" target="_blank" rel="noopener">온맘닷컴</a></div></footer>`;
}
function renderPopup(site){
  if(!site.popup.on || (!site.popup.title && !site.popup.body)) return '';
  return `<div class="spop-veil" data-popveil><div class="spop">
    ${safeUrl(site.popup.img)?`<div class="spop-img" style="background-image:url('${cssUrl(safeUrl(site.popup.img))}')"></div>`:''}
    <div class="spop-bd"><b>${esc(site.popup.title)}</b><p>${nl(site.popup.body)}</p></div>
    <div class="spop-x"><button data-poptoday>오늘 하루 닫기</button><button data-popclose>닫기</button></div>
  </div></div>`;
}
function renderSections(site, editable, role){
  return site.sections.map((sec,i)=>{
    const def=SECTIONS[sec.type]; if(!def) return '';
    if(!sec.on && !editable) return '';
    const bar = editable ? `<div class="e-bar">
        <span class="lb">${def.icon} ${def.name}</span>
        <button data-act="up" data-id="${sec.id}" title="위로">▲</button>
        <button data-act="down" data-id="${sec.id}" title="아래로">▼</button>
        <button data-act="edit" data-id="${sec.id}" title="내용 고치기">✎ 편집</button>
        <button data-act="toggle" data-id="${sec.id}" title="${sec.on?'숨기기':'보이기'}">${sec.on?'👁':'🚫'}</button>
        ${role==='maker'?`<button data-act="del" data-id="${sec.id}" title="삭제">✕</button>`:''}
      </div>`:'';
    const hidden = (!sec.on && editable) ? `<div class="sec-hidden-note">이 섹션은 방문자에게 보이지 않습니다 (숨김 상태)</div>`:'';
    const body = sec.on||editable ? def.render(sec.data, site) : '';
    const hdrag = (editable && sec.type==='hero') ? `<div class="hdrag" data-hdrag="${sec.id}" title="끌어서 높이 조절 · 더블클릭하면 자동 높이"><span>⣿ 높이 조절</span></div>` : '';
    return `<section class="sec ${editable?'e-sec':''}" id="go-${sec.id}" data-sec="${sec.id}" ${(!sec.on&&editable)?'style="opacity:.45"':''}>${bar}${hidden}<div class="alt-paint">${body}</div>${hdrag}</section>`;
  }).join('');
}
function renderPages(site){
  return (site.pages||[]).map(p=>{
    const def=SECTIONS[p.type]; if(!def) return '';
    return `<div class="s-page" data-pgview="${p.id}" hidden>
      <div class="wrap1" style="padding:26px 22px 0"><button class="pg-back" data-gohome>← 처음 화면으로</button></div>
      ${def.render(p.data,site,p)}</div>`;
  }).join('');
}
function renderSite(site, {editable=false, role='maker', popup=false}={}){
  return `<div class="site role-${esc(role)}">${renderHeader(site)}<main data-home>${renderSections(site,editable,role)}</main>${renderPages(site)}${renderCategoryPages(site,editable)}${renderFooter(site)}<div class="ub-modal" data-ub-modal hidden></div>${popup?renderPopup(site):''}</div>`;
}

/* ════════════════ 빌더 앱 ════════════════ */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const preview=$('#preview'), pbody=$('#pbody'), ptabs=$('#ptabs'), aiPanel=$('#aiPanel'), aiBody=$('#aiBody'), aiInput=$('#aiInput');

let site=null;
let st={role:'maker', tab:'tpl', dev:'', editing:null, page:null, cat:null, locked:false, popClosed:false};
let drawTimer=null, saveTimer=null;

/* ── 저장 ── */
async function saveNow(silent){
  try{
    const data=JSON.stringify(site);
    if(window.storage) await window.storage.set('onmam-site-v1', data);
    else localStorage.setItem('onmam-site-v1', data);
    $('#saveState').textContent='저장됨 '+new Date().toTimeString().slice(0,5);
    if(!silent) toast('저장했습니다');
  }catch(e){
    $('#saveState').textContent='저장 실패 · 백업 파일로 보관하세요';
    if(!silent) toast('브라우저 저장 공간이 부족합니다. 백업 파일을 내려받아 보관하세요');
  }
}
function touched(){
  $('#saveState').textContent='수정됨…';
  clearTimeout(saveTimer); saveTimer=setTimeout(()=>saveNow(true),1800);
}
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('on'); clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('on'),2200); }

/* ── 그리기 ── */
function applyStyle(){
  $('#site-style').textContent=siteCSS(site);
  const dz=site.design||{}, f=$('#frame');
  if(!st.dev){ f.style.maxWidth = dz.full ? '100%' : ((+dz.width||1200)+20)+'px'; }
  else f.style.maxWidth='';
}
function drawPreview(keepScroll=true){
  const sc=$('#stage').scrollTop;
  preview.innerHTML=renderSite(site,{editable:st.role!=='visitor', role:st.role, popup:st.role==='visitor'&&!st.popClosed});
  if(st.page){
    const pv=preview.querySelector(`[data-pgview="${st.page}"]`);
    if(pv){ const hm=preview.querySelector('[data-home]'); if(hm) hm.hidden=true; pv.hidden=false; }
    else st.page=null;
  } else if(st.cat){
    const cv=preview.querySelector(`[data-catview="${st.cat}"]`);
    if(cv){ const hm=preview.querySelector('[data-home]'); if(hm) hm.hidden=true; cv.hidden=false; }
    else st.cat=null;
  }
  initUserBoards(preview);
  if(keepScroll) $('#stage').scrollTop=sc;
  $('#chromeUrl').textContent=site.meta.domain||('미리보기 · '+site.meta.name);
}
function scheduleDraw(){ clearTimeout(drawTimer); drawTimer=setTimeout(()=>{applyStyle();drawPreview();},250); touched(); }
function drawAll(){ applyStyle(); drawPreview(false); renderRole(); renderTabs(); renderPanel(); }

/* ── 역할 / 기기 ── */
const ROLES=[ ['maker','🔧 제작'], ['church','⚙️ 운영 관리'], ['visitor','👀 방문자 화면'] ];
function renderRole(){
  $('#roleSwitch').innerHTML=ROLES.map(([k,n])=>`<button data-role="${k}" class="${st.role===k?'on':''}" ${k==='maker'&&st.locked?'disabled title="온맘닷컴 제작 전용 권한입니다"':''}>${n}</button>`).join('');
}
$('#roleSwitch').addEventListener('click',e=>{
  const b=e.target.closest('[data-role]'); if(!b||b.disabled) return;
  st.role=b.dataset.role; st.editing=null; st.popClosed=false;
  st.tab = st.role==='maker'?'tpl': st.role==='church'?'home':null;
  $('#panel').classList.toggle('hide', st.role==='visitor');
  aiPanel?.classList.toggle('hide', st.role==='visitor');
  drawAll();
});
$('#devSwitch').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  st.dev=b.dataset.d; $$('#devSwitch button').forEach(x=>x.classList.toggle('on',x===b));
  $('#frame').className=st.dev; applyStyle();
});

/* ── 패널 탭 ── */
const TABS={
  maker:[['tpl','템플릿'],['sec','섹션'],['pages','페이지·게시판'],['design','디자인'],['info','교회 정보'],['menu','메뉴'],['deliver','납품']],
  church:[['home','자주 하는 일'],['layout','화면 구성'],['pages','페이지·게시판'],['menu','메뉴'],['info','교회 정보'],['popup','팝업 공지'],['backup','백업']]
};
function renderTabs(){
  if(st.role==='visitor'){ ptabs.innerHTML=''; return; }
  ptabs.innerHTML=(TABS[st.role]||[]).map(([k,n])=>`<button data-tab="${k}" class="${st.tab===k?'on':''}">${n}</button>`).join('');
}
ptabs.addEventListener('click',e=>{
  const b=e.target.closest('[data-tab]'); if(!b) return;
  st.tab=b.dataset.tab; st.editing=null; renderTabs(); renderPanel();
});

/* ── 폼 빌더 ── */
function inputHTML(bind,val,opt={}){
  if(opt.ta) return `<textarea data-bind="${bind}" rows="${opt.rows||4}">${esc(val)}</textarea>`;
  return `<input data-bind="${bind}" value="${esc(val)}" ${opt.type?`type="${opt.type}"`:''}>`;
}
function menuRowHTML(m,path,depth){
  const kidMax=depth===0?10:depth===1?5:0;
  const kids=m.children||[];
  return `<div class="sec-li ${m.on?'':'off'}" style="flex-wrap:wrap;margin-left:${depth*18}px">
    ${depth?`<span style="opacity:.45;font-size:12px">└</span>`:''}
    <input data-bind="menu:${path}:label" value="${esc(m.label)}" style="flex:1;min-width:80px">
    <button class="mini" data-op="mup" data-path="${path}">▲</button>
    <button class="mini" data-op="mdn" data-path="${path}">▼</button>
    <button class="mini" data-op="mtg" data-path="${path}">${m.on?'👁':'🚫'}</button>
    <button class="mini danger" data-op="mdel" data-path="${path}">✕</button>

function imgFieldHTML(bind,val){
  return `<div class="img-field">

    <div class="col">
      <input data-bind="${bind}" value="${esc(val)}" placeholder="이미지 주소(URL) 붙여넣기">

        <button class="mini danger" data-op="imgclr" data-bind-t="${bind}">지우기</button>
      </div></div></div>`;
}
function secSelHTML(bind,val){
  const so=site.sections.map(x=>`<option value="${x.id}" ${x.id===val?'selected':''}>${SECTIONS[x.type].icon} ${SECTIONS[x.type].name}</option>`).join('');
  const po=(site.pages||[]).map(p=>`<option value="p:${p.id}" ${('p:'+p.id)===val?'selected':''}>${SECTIONS[p.type].icon} ${esc(p.data.title||SECTIONS[p.type].name)}</option>`).join('');
  return `<select data-bind="${bind}"><option value="">(연결 없음)</option><optgroup label="첫 화면 섹션">${so}</optgroup>${po?`<optgroup label="페이지·게시판">${po}</optgroup>`:''}</select>`;
}
function richFieldHTML(bind,val){
  const plain=String(val||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
  return `<div class="rich-card" data-rich-card="${bind}">
    <div class="rich-prev ${plain?'':'empty'}">${plain?richHTML(val):'아직 내용이 없습니다. 편집기를 열어 작성하세요.'}</div>
    <div class="rich-actions"><button class="mini" data-op="richEdit" data-bind-t="${bind}">✎ Tiptap 편집기 열기</button></div>
  </div>`;
}
function boardOptionsHTML(bind,val){
  const o=Object.assign(defaultBoardOptions(), val||{});
  const item=(k,n)=>`<label class="check-li"><input type="checkbox" data-bind="${bind}:${k}" ${o[k]?'checked':''} style="width:auto"> ${n}</label>`;
  return `<div class="note">방문자 화면의 글쓰기와 게시물 버튼 구성을 정합니다. 실제 여러 성도 공유 저장은 서버/API 연결 단계에서 완성됩니다.</div>
    ${item('write','방문자 글쓰기 허용')}${item('edit','게시물 수정 버튼 표시')}${item('del','게시물 삭제 버튼 표시')}${item('author','작성자 입력 사용')}${item('notice','공지글/고정글 옵션 사용')}${item('secret','비밀글 옵션 사용')}${item('comments','댓글 영역 사용')}`;
}
function listHTML(sec,f){
  const rows=(sec.data[f.k]||[]).map((row,i)=>{
    const cols=f.cols.map(c=>{
      const bind=`sec:${sec.id}:${f.k}:${i}:${c.k}`;
      if(c.img) return imgFieldHTML(bind,row[c.k]);
      if(c.file) return `<div class="file-field"><span style="flex:1;font-size:12px;opacity:.8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${row.fname?'📎 '+esc(row.fname):'첨부 파일 없음'}</span>
        <button class="mini" data-op="fileup" data-bind-t="${bind}">📎 파일 붙이기</button>
        ${row[c.k]?`<button class="mini danger" data-op="fileclr" data-bind-t="${bind}">지우기</button>`:''}</div>`;
      if(c.rich) return richFieldHTML(bind,row[c.k]);
      return c.ta?`<textarea data-bind="${bind}" rows="2" placeholder="${esc(c.n)}">${esc(row[c.k])}</textarea>`
                 :`<input data-bind="${bind}" value="${esc(row[c.k])}" placeholder="${esc(c.n)}">`;
    }).join('');
    return `<div class="list-row"><div class="cols">${cols}</div>
      <div class="ops">
        <button class="mini" data-op="lup" data-sec="${sec.id}" data-k="${f.k}" data-i="${i}">▲</button>
        <button class="mini" data-op="ldn" data-sec="${sec.id}" data-k="${f.k}" data-i="${i}">▼</button>
        <button class="mini danger" data-op="ldel" data-sec="${sec.id}" data-k="${f.k}" data-i="${i}">✕</button>
      </div></div>`;
  }).join('');
  return `<div class="list-tbl">${rows||''}</div>
    <button class="mini" data-op="ladd" data-sec="${sec.id}" data-k="${f.k}" style="width:100%;padding:7px">＋ 한 줄 추가</button>`;
}
function editFormHTML(sec){
  const def=SECTIONS[sec.type];
  const fs=def.fields.map(f=>{
    const bind=`sec:${sec.id}:${f.k}`;
    let inner='';
    if(f.t==='text') inner=inputHTML(bind,sec.data[f.k]);
    else if(f.t==='ta') inner=inputHTML(bind,sec.data[f.k],{ta:1,rows:f.rows||4});
    else if(f.t==='img') inner=imgFieldHTML(bind,sec.data[f.k]);
    else if(f.t==='rich') inner=richFieldHTML(bind,sec.data[f.k]);
    else if(f.t==='opts') inner=boardOptionsHTML(bind,sec.data[f.k]);
    else if(f.t==='secsel') inner=secSelHTML(bind,sec.data[f.k]);
    else if(f.t==='list') inner=listHTML(sec,f);
    return `<div class="f-row"><label>${esc(f.n)}</label>${inner}</div>`;
  }).join('');
  return `<div class="back-row"><button data-op="back">← 돌아가기</button><b>${def.icon} ${def.name} 편집</b></div>
    <div class="desc">고치면 오른쪽 화면에 바로 반영됩니다.</div>${fs}`;
}

function target(bind){
  const p=bind.split(':');
  if(p[0]==='meta')  return [site.meta,p[1]];
  if(p[0]==='popup') return [site.popup,p[1]];
  if(p[0]==='theme') return [site.theme,p[1]];
  if(p[0]==='design') return [site.design,p[1]];
  if(p[0]==='menu'){ const n=menuNode(p[1]); return n?[n,p[2]]:null; }
  if(p[0]==='sec'){
    const s=findSec(p[1]); if(!s) return null;
    if(p.length===3) return [s.data,p[2]];
    if(p[2]==='opts'){ s.data.opts=Object.assign(defaultBoardOptions(),s.data.opts||{}); return [s.data.opts,p[3]]; }
    const row=(s.data[p[2]]||[])[+p[3]]; return row?[row,p[4]]:null;
  }
  return null;
}

pbody.addEventListener('input',e=>{

});

let tiptapLib=null;
async function loadTiptap(){
  if(tiptapLib) return tiptapLib;
  const base='https://esm.sh/';
  const [core, starter, link, image, youtube, table, row, header, cell] = await Promise.all([
    import(base+'@tiptap/core@3?bundle'),
    import(base+'@tiptap/starter-kit@3?bundle'),
    import(base+'@tiptap/extension-link@3?bundle'),
    import(base+'@tiptap/extension-image@3?bundle'),
    import(base+'@tiptap/extension-youtube@3?bundle'),
    import(base+'@tiptap/extension-table@3?bundle'),
    import(base+'@tiptap/extension-table-row@3?bundle'),
    import(base+'@tiptap/extension-table-header@3?bundle'),
    import(base+'@tiptap/extension-table-cell@3?bundle')
  ]);
  let textStyle=null, fontFamily=null, underline=null;
  try{ [textStyle,fontFamily,underline] = await Promise.all([import(base+'@tiptap/extension-text-style@3?bundle'), import(base+'@tiptap/extension-font-family@3?bundle'), import(base+'@tiptap/extension-underline@3?bundle')]); }catch(_){ }
  tiptapLib={Editor:core.Editor, StarterKit:starter.default, Link:link.default, Image:image.default, Youtube:youtube.default, Table:table.default, TableRow:row.default, TableHeader:header.default, TableCell:cell.default, TextStyle:textStyle?.default, FontFamily:fontFamily?.default, Underline:underline?.default};
  return tiptapLib;
}
function fallbackExec(cmd,val){
  const fb=st._richFallback; if(!fb) return;
  fb.focus();
  const ex=(name,v=null)=>document.execCommand(name,false,v);
  if(cmd==='font') ex('fontName',val);
  if(cmd==='block') ex('formatBlock',val||'P');
  if(cmd==='size') ex('fontSize',val||'3');
  if(cmd==='bold') ex('bold');
  if(cmd==='italic') ex('italic');
  if(cmd==='underline') ex('underline');
  if(cmd==='strike') ex('strikeThrough');
  if(cmd==='h2') ex('formatBlock','H2');
  if(cmd==='h3') ex('formatBlock','H3');
  if(cmd==='bullet') ex('insertUnorderedList');
  if(cmd==='ordered') ex('insertOrderedList');
  if(cmd==='quote') ex('formatBlock','BLOCKQUOTE');
  if(cmd==='left') ex('justifyLeft');
  if(cmd==='center') ex('justifyCenter');
  if(cmd==='right') ex('justifyRight');
  if(cmd==='justify') ex('justifyFull');
  if(cmd==='hr') ex('insertHorizontalRule');
  if(cmd==='undo') ex('undo');
  if(cmd==='redo') ex('redo');
  if(cmd==='link'){ const url=safeUrl(prompt('연결할 주소를 입력하세요','https://')); if(url) ex('createLink',url); }
  if(cmd==='image'){ const url=safeUrl(prompt('이미지 주소를 입력하세요','https://')); if(url) ex('insertImage',url); }
  if(cmd==='youtube'){
    const url=safeUrl(prompt('유튜브 주소를 입력하세요','https://www.youtube.com/watch?v='));
    const v=ytid(url); if(v) ex('insertHTML',`<iframe src="https://www.youtube.com/embed/${v}" title="동영상" loading="lazy" allowfullscreen></iframe><p></p>`);
  }
  if(cmd==='table') ex('insertHTML','<table><tbody><tr><th>제목</th><th>내용</th></tr><tr><td>항목</td><td>내용을 입력하세요</td></tr></tbody></table><p></p>');
}
function runRichCmd(cmd,val){
  const ed=st._richEditor;
  if(!ed){ fallbackExec(cmd,val); return; }
  if(cmd==='font'){ if(ed.chain().focus().setFontFamily) ed.chain().focus().setFontFamily(val).run(); else fallbackExec(cmd,val); }
  if(cmd==='block'){
    if(val==='P') ed.chain().focus().setParagraph().run();
    if(val==='H2') ed.chain().focus().toggleHeading({level:2}).run();
    if(val==='H3') ed.chain().focus().toggleHeading({level:3}).run();
  }
  if(cmd==='bold') ed.chain().focus().toggleBold().run();
  if(cmd==='italic') ed.chain().focus().toggleItalic().run();
  if(cmd==='underline'){ if(ed.chain().focus().toggleUnderline) ed.chain().focus().toggleUnderline().run(); else fallbackExec(cmd); }
  if(cmd==='strike') ed.chain().focus().toggleStrike().run();
  if(cmd==='h2') ed.chain().focus().toggleHeading({level:2}).run();
  if(cmd==='h3') ed.chain().focus().toggleHeading({level:3}).run();
  if(cmd==='bullet') ed.chain().focus().toggleBulletList().run();
  if(cmd==='ordered') ed.chain().focus().toggleOrderedList().run();
  if(cmd==='quote') ed.chain().focus().toggleBlockquote().run();
  if(['left','center','right','justify','size'].includes(cmd)) fallbackExec(cmd,val);
  if(cmd==='hr') ed.chain().focus().setHorizontalRule().run();
  if(cmd==='undo') ed.chain().focus().undo().run();
  if(cmd==='redo') ed.chain().focus().redo().run();
  if(cmd==='link'){ const url=safeUrl(prompt('연결할 주소를 입력하세요','https://')); if(url) ed.chain().focus().setLink({href:url}).run(); }
  if(cmd==='image'){ const url=safeUrl(prompt('이미지 주소를 입력하세요','https://')); if(url) ed.chain().focus().setImage({src:url}).run(); }
  if(cmd==='youtube'){ const url=safeUrl(prompt('유튜브 주소를 입력하세요','https://www.youtube.com/watch?v=')); if(url) ed.commands.setYoutubeVideo({src:url}); }
  if(cmd==='table') ed.chain().focus().insertTable({rows:3, cols:3, withHeaderRow:true}).run();
}
async function openRichEditor(bind){
  const t=target(bind); if(!t) return;

  modal.classList.add('on'); modal.setAttribute('aria-hidden','false');
  modal.innerHTML=`<div class="rich-dialog" role="dialog" aria-modal="true" aria-label="게시글 본문 편집">

      <select data-rich-size title="글자 크기"><option value="2">작게</option><option value="3" selected>보통</option><option value="4">크게</option><option value="5">아주 크게</option></select><span class="sep"></span>

      <button data-rich-cmd="bold" title="굵게">B</button><button data-rich-cmd="italic" title="기울임"><i>I</i></button><button data-rich-cmd="strike" title="취소선">S</button><button data-rich-cmd="underline" title="밑줄">U</button><button data-rich-cmd="quote" title="인용">❝</button><span class="sep"></span>
      <button data-rich-cmd="left" title="왼쪽 정렬">≡</button><button data-rich-cmd="center" title="가운데 정렬">≣</button><button data-rich-cmd="right" title="오른쪽 정렬">≡</button><button data-rich-cmd="justify" title="양쪽 정렬">▤</button><span class="sep"></span>
      <button data-rich-cmd="link">링크</button><button data-rich-cmd="image">이미지</button><button data-rich-cmd="youtube">유튜브</button><button data-rich-cmd="table">표</button><button data-rich-cmd="hr">선</button>
    </div>
    <div class="rich-editor"><div class="rich-page"><div data-rich-root>편집기를 불러오는 중입니다…</div></div></div>
    <div class="rich-foot"><div class="left">사진·표·링크·유튜브를 본문 안에 넣을 수 있습니다.</div><div class="right"><button class="tb-btn" data-rich-cancel>취소</button><button class="tb-btn gold" data-rich-save>본문 적용</button></div></div>
  </div>`;
  st._richBind=bind; st._richFallback=null;
  try{
    const lib=await loadTiptap();
    const root=modal.querySelector('[data-rich-root]'); root.textContent='';
    st._richEditor?.destroy?.();
    st._richEditor=new lib.Editor({
      element:root,
      content:richEditorHTML(t[0][t[1]]),
      extensions:[
        lib.StarterKit,
        ...(lib.TextStyle?[lib.TextStyle]:[]), ...(lib.FontFamily?[lib.FontFamily]:[]), ...(lib.Underline?[lib.Underline]:[]),
        lib.Link.configure({openOnClick:false, autolink:true, defaultProtocol:'https'}),
        lib.Image.configure({inline:false}),
        lib.Youtube.configure({controls:true, nocookie:true}),
        lib.Table.configure({resizable:true}), lib.TableRow, lib.TableHeader, lib.TableCell
      ]
    });
  }catch(err){
    modal.querySelector('[data-rich-root]').innerHTML=`<div class="rich-fallback" contenteditable="true">${richEditorHTML(t[0][t[1]])}</div>`;
    st._richFallback=modal.querySelector('.rich-fallback');
    st._richFallback.focus();
    modal.querySelector('.left').textContent='Tiptap을 불러오지 못해 내장 편집기로 열었습니다. 위 도구모음은 그대로 사용할 수 있습니다.';
  }
}
function closeRichEditor(){
  st._richEditor?.destroy?.(); st._richEditor=null; st._richFallback=null; st._richBind=null;
  const modal=$('#richModal'); modal.classList.remove('on'); modal.setAttribute('aria-hidden','true'); modal.innerHTML='';
}
$('#richModal').addEventListener('click',e=>{
  if(e.target.id==='richModal'||e.target.closest('[data-rich-close]')||e.target.closest('[data-rich-cancel]')){ closeRichEditor(); return; }
  const cmd=e.target.closest('[data-rich-cmd]'); if(cmd){
    const z=cmd.dataset.richCmd;
    if(z==='zoomIn'||z==='zoomOut'){ const page=$('#richModal .rich-page'); const cur=+(page?.dataset.zoom||100); const next=Math.max(70,Math.min(140,cur+(z==='zoomIn'?10:-10))); if(page){page.dataset.zoom=next;page.style.transform=`scale(${next/100})`;page.style.transformOrigin='top center';} const label=$('#richModal .zoom'); if(label) label.textContent=next+'%'; return; }
    runRichCmd(z); return; }
  if(e.target.closest('[data-rich-save]')){
    const t=target(st._richBind); if(t){
      const html=st._richEditor ? st._richEditor.getHTML() : st._richFallback?.innerHTML || '';

/* 섹션 공통 동작 */
function doSecOp(act,id){
  if(act==='edit'){
    st.editing=id; renderPanel();
    const el=preview.querySelector(`[data-sec="${id}"]`);
    if(el){el.classList.add('hl');el.scrollIntoView({behavior:'smooth',block:'start'});setTimeout(()=>el.classList.remove('hl'),1500);}
    return;
  }
  const i=site.sections.findIndex(x=>x.id===id); if(i<0) return;
  if(act==='up'&&i>0)[site.sections[i-1],site.sections[i]]=[site.sections[i],site.sections[i-1]];
  if(act==='down'&&i<site.sections.length-1)[site.sections[i+1],site.sections[i]]=[site.sections[i],site.sections[i+1]];
  if(act==='toggle')site.sections[i].on=!site.sections[i].on;
  if(act==='del'){
    if(!confirm(`'${SECTIONS[site.sections[i].type].name}' 섹션을 삭제할까요?`))return;
    (function prune(arr){ for(let i=arr.length-1;i>=0;i--){ const m=arr[i]; if(m.url===undefined&&m.to===id) arr.splice(i,1); else if(m.children&&m.children.length) prune(m.children); } })(site.menus);
    site.sections.splice(i,1); st.editing=null;
  }
  applyStyle(); drawPreview(); renderPanel(); touched();
}

pbody.addEventListener('click',e=>{

/* ── 오른쪽 AI 작업 도우미 (로컬 보조 모드) ── */
function aiAdd(role,text){
  if(!aiBody) return;
  const d=document.createElement('div');
  d.className='ai-msg '+role;
  d.innerHTML='<pre></pre>';
  d.querySelector('pre').textContent=text;
  aiBody.appendChild(d);
  aiBody.scrollTop=aiBody.scrollHeight;
}
function aiDraft(kind,raw){
  const base=(raw||'').trim();
  if(kind==='notice') return `[공지 초안]\n제목: ${base||'교회 소식을 알려드립니다'}\n\n샬롬. 성도 여러분께 안내드립니다.\n${base||'이번 주 교회 일정과 안내 사항을 확인해 주세요.'}\n\n문의가 필요하신 분은 교회 사무실로 연락해 주세요.`;
  if(kind==='story') return `[소소한 이야기 초안]\n${base||'오늘 교회에서 나누고 싶은 따뜻한 이야기를 적어 주세요.'}\n\n함께 웃고, 함께 기도하며, 하나님 안에서 자라가는 우리의 작은 순간을 나눕니다.`;
  if(kind==='polish') return base ? `다듬은 글:\n${base.replace(/합니다\./g,'합니다.\n').replace(/요\./g,'요.\n')}` : '다듬을 글을 입력하거나, 게시글 본문에서 문장을 선택한 뒤 눌러 주세요.';
  if(kind==='image') return `[그림 프롬프트]\n따뜻한 한국 교회 공동체 분위기, ${base||'예배 후 성도들이 밝게 교제하는 장면'}, 자연광, 깨끗한 배경, 홈페이지 게시글 대표 이미지, 현실적인 사진 스타일`;
  return base || '작성할 내용을 입력해 주세요.';
}
function currentEditorText(){
  const sel=String(window.getSelection&&window.getSelection()||'').trim();
  if(sel) return sel;
  const ed=document.querySelector('[data-f="b"][contenteditable="true"]');
  return ed ? ed.innerText.trim() : '';
}
let aiLast='';
document.addEventListener('click',e=>{
  const preset=e.target.closest('[data-ai-preset]');
  if(preset){
    const raw=aiInput.value.trim()||currentEditorText();
    aiInput.value=raw;
    aiLast=aiDraft(preset.dataset.aiPreset,raw);
    aiAdd('user', raw||preset.textContent.trim());
    aiAdd('assistant', aiLast);
    return;
  }
  if(e.target.closest('#aiAsk')){
    const raw=aiInput.value.trim();
    aiLast=aiDraft('notice',raw);
    aiAdd('user', raw||'작성 요청');
    aiAdd('assistant', aiLast);
    return;
  }
  if(e.target.closest('#aiInsert')){
    const ed=document.querySelector('[data-f="b"][contenteditable="true"]');
    if(ed&&aiLast){ ed.focus(); document.execCommand('insertHTML',false,aiLast.replace(/\n/g,'<br>')+'<p></p>'); toast('AI 초안을 본문에 넣었습니다'); }
    else toast('열려 있는 게시글 본문이나 넣을 내용이 없습니다');
    return;
  }
  if(e.target.closest('#aiClear')){ aiBody.innerHTML='<div class="ai-msg assistant">대화 내용을 비웠습니다. 필요한 글이나 이미지 아이디어를 다시 요청해 주세요.</div>'; aiLast=''; return; }
});

/* ════════════════ 시작 ════════════════ */
function normDesign(s){
  if(!s.design||typeof s.design!=='object') s.design={width:1200,full:false};
  s.design.width=Math.min(1920,Math.max(1200,+s.design.width||1200));
  s.design.full=!!s.design.full;
  if(s.theme){
    if(!FONTS[s.theme.font]) s.theme.font='pret';
    if(!WEIGHTS[String(s.theme.hw)]) s.theme.hw='700';
    if(!WEIGHTS[String(s.theme.bw)]) s.theme.bw='400';
    s.theme.hs=Math.min(60,Math.max(16,+s.theme.hs||26));
    s.theme.bs=Math.min(22,Math.max(12,+s.theme.bs||15));
    if(typeof s.theme.hc!=='string') s.theme.hc='';
    if(typeof s.theme.bc!=='string') s.theme.bc='';
    s.theme.hcOn=!!s.theme.hcOn; s.theme.bcOn=!!s.theme.bcOn;
    s.theme.ms=Math.min(20,Math.max(11,+s.theme.ms||13.5));
  }
  if(!Array.isArray(s.pages)) s.pages=[];
  s.pages.forEach(pg=>{ if(!SECTIONS[pg.type]||!SECTIONS[pg.type].pageOnly) pg.type='page'; if(!pg.data||typeof pg.data!=='object') pg.data=SECTIONS[pg.type].def(s); });
  if(Array.isArray(s.menus)){
    (function normMenus(arr,depth){
      arr.forEach(m=>{
        if(!Array.isArray(m.children)) m.children=[];
        if(depth>=2){ m.children=[]; return; }
        const max=depth===0?10:5;
        if(m.children.length>max) m.children=m.children.slice(0,max);
        normMenus(m.children,depth+1);
      });
    })(s.menus,0);
  }
}
function findSec(id){ return site.sections.find(x=>x.id===id)||(site.pages||[]).find(x=>x.id===id); }
function menuNode(path){
  let arr=site.menus, n=null;
  for(const ix of String(path).split('.')){ n=arr&&arr[+ix]; if(!n) return null; arr=n.children; }
  return n;
}
function menuParent(path){
  const ps=String(path).split('.'); let arr=site.menus;
  for(let i=0;i<ps.length-1;i++){ const n=arr[+ps[i]]; if(!n) return null; n.children=n.children||[]; arr=n.children; }
  return [arr,+ps[ps.length-1]];
}
function boot(){
  normDesign(site);
  finalizeLinks(site);
  $('#panel').classList.toggle('hide', st.role==='visitor');
  aiPanel?.classList.toggle('hide', st.role==='visitor');
  drawAll();
  if(st.locked) $('#saveState').textContent='교회 관리 파일 · 수정 후 백업 탭에서 파일을 다시 내보내 보관하세요';
}
(function init(){
  let seed=null; try{ seed=JSON.parse($('#seed').textContent); }catch(e){}
  if(seed&&seed.site){ site=seed.site; st.locked=!!seed.locked; st.role='church'; st.tab='home'; boot(); return; }
  (async()=>{
    try{
      if(window.storage){ const r=await window.storage.get('onmam-site-v1');
        if(r&&r.value){ site=JSON.parse(r.value); boot(); return; } }
      else { const r=localStorage.getItem('onmam-site-v1');
        if(r){ site=JSON.parse(r); boot(); return; } }
    }catch(e){}
    site=defaultSite('full'); boot();
  })();
})();
